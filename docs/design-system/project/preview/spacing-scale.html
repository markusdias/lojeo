<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--paper); font-family: var(--font-sans); color: var(--fg); }
  .row { display: flex; align-items: flex-end; gap: 8px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: var(--accent); border-radius: 4px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-secondary); }
  .name { font-size: 11px; font-weight: 500; color: var(--fg); }
</style></head><body>
<div class="row">
  <div class="step"><div class="box" style="width:4px;height:4px"></div><div class="name">1</div><div class="label">4</div></div>
  <div class="step"><div class="box" style="width:8px;height:8px"></div><div class="name">2</div><div class="label">8</div></div>
  <div class="step"><div class="box" style="width:12px;height:12px"></div><div class="name">3</div><div class="label">12</div></div>
  <div class="step"><div class="box" style="width:16px;height:16px"></div><div class="name">4</div><div class="label">16</div></div>
  <div class="step"><div class="box" style="width:20px;height:20px"></div><div class="name">5</div><div class="label">20</div></div>
  <div class="step"><div class="box" style="width:24px;height:24px"></div><div class="name">6</div><div class="label">24</div></div>
  <div class="step"><div class="box" style="width:32px;height:32px"></div><div class="name">8</div><div class="label">32</div></div>
  <div class="step"><div class="box" style="width:40px;height:40px"></div><div class="name">10</div><div class="label">40</div></div>
  <div class="step"><div class="box" style="width:48px;height:48px"></div><div class="name">12</div><div class="label">48</div></div>
  <div class="step"><div class="box" style="width:64px;height:64px"></div><div class="name">16</div><div class="label">64</div></div>
</div>
<div style="margin-top:14px;font-size:12px;color:var(--fg-secondary)">Escala 4px-base · espaçoso (Stripe-style)</div>
</body></html>
