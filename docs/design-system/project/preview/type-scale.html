<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--paper); font-family: var(--font-sans); color: var(--fg); }
  .row { display: flex; flex-direction: column; gap: 12px; }
  .item { display: grid; grid-template-columns: 90px 1fr; gap: 16px; align-items: baseline; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .item:last-child { border: 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-secondary); }
</style></head><body>
<div class="row">
  <div class="item"><div class="meta">H1 · 36/700</div><div style="font-size:36px;font-weight:700;letter-spacing:-0.025em;line-height:1.2">Pedidos pendentes</div></div>
  <div class="item"><div class="meta">H2 · 30/600</div><div style="font-size:30px;font-weight:600;letter-spacing:-0.02em;line-height:1.25">Pedidos pendentes</div></div>
  <div class="item"><div class="meta">H3 · 24/600</div><div style="font-size:24px;font-weight:600;letter-spacing:-0.02em;line-height:1.3">Pedidos pendentes</div></div>
  <div class="item"><div class="meta">H4 · 20/500</div><div style="font-size:20px;font-weight:500;letter-spacing:-0.015em;line-height:1.4">Pedidos pendentes</div></div>
  <div class="item"><div class="meta">Body · 16/400</div><div style="font-size:16px;line-height:1.5">Lojista MEI/PME nunca precisa buscar ajuda externa pra usar.</div></div>
  <div class="item"><div class="meta">Body S · 14/400</div><div style="font-size:14px;line-height:1.5;color:var(--fg-secondary)">Estimativa baseada nos últimos 7 dias.</div></div>
  <div class="item"><div class="meta">Caption · 12/500</div><div style="font-size:12px;line-height:1.4;color:var(--fg-secondary)">Atualizado há 2 minutos</div></div>
</div>
</body></html>
