<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--paper); font-family: var(--font-sans); color: var(--fg); }
  .row { display: flex; gap: 12px; align-items: flex-end; }
  .item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 90%; aspect-ratio: 1; background: var(--surface); border: 1px solid var(--border); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-secondary); }
  .name { font-size: 11px; font-weight: 500; }
</style></head><body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">xs</div><div class="label">4px</div></div>
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">sm</div><div class="label">6px</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">md</div><div class="label">8px</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">lg</div><div class="label">12px</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">xl</div><div class="label">16px</div></div>
  <div class="item"><div class="box" style="border-radius:20px"></div><div class="name">2xl</div><div class="label">20px</div></div>
  <div class="item"><div class="box" style="border-radius:9999px"></div><div class="name">full</div><div class="label">∞</div></div>
</div>
</body></html>
