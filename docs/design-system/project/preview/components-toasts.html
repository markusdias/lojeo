<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--paper); font-family:var(--font-sans); color:var(--fg); display:flex; flex-direction:column; gap:10px; }
  .toast { display:flex; align-items:flex-start; gap:12px; background:#fff; border:1px solid #E5E5E5; border-left:3px solid var(--bar); border-radius:10px; padding:12px 14px; box-shadow: 0 4px 12px -4px rgba(10,10,10,0.08); max-width: 460px; }
  .toast .ico { width:20px; height:20px; flex-shrink:0; color:var(--bar); margin-top:1px; }
  .toast .title { font-size:14px; font-weight:600; color:#0A0A0A; }
  .toast .msg { font-size:13px; color:#525252; margin-top:2px; line-height:1.45; }
  .success { --bar:#10B981; }
  .warn { --bar:#F59E0B; }
  .err { --bar:#EF4444; }
  .info { --bar:#3B82F6; }
  .x { margin-left:auto; color:#A3A3A3; cursor:pointer; }
</style></head><body>
  <div class="toast success">
    <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m5 12 5 5L20 7"/></svg>
    <div><div class="title">Vendido!</div><div class="msg">Pedido #PED-00185 confirmado. Cliente recebeu o e-mail.</div></div>
    <span class="x">×</span>
  </div>
  <div class="toast warn">
    <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 9v4M12 17h.01M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
    <div><div class="title">3 produtos com estoque baixo</div><div class="msg">Reposição recomendada para evitar pausa nas vendas.</div></div>
  </div>
  <div class="toast err">
    <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
    <div><div class="title">Não rolou — vamos tentar de novo?</div><div class="msg">A integração com Mercado Pago não respondeu. Tente em alguns segundos.</div></div>
  </div>
</body></html>
