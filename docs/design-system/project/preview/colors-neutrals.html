<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--paper); font-family: var(--font-sans); color: var(--fg); }
  .grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
  .swatch { aspect-ratio: 0.75; border-radius: 6px; border: 1px solid rgba(0,0,0,0.06); display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; }
  .swatch .num { font-size: 9px; font-weight: 600; letter-spacing: -0.01em; }
  .swatch .hex { font-family: var(--font-mono); font-size: 8px; opacity: 0.7; margin-top: 1px; }
  .dark-fg .num, .dark-fg .hex { color: #0A0A0A; }
  .light-fg .num, .light-fg .hex { color: #FAFAF7; }
</style></head><body>
<div class="grid">
  <div class="swatch dark-fg" style="background:#FAFAF7"><div class="num">paper</div><div class="hex">FAFAF7</div></div>
  <div class="swatch dark-fg" style="background:#FFFFFF"><div class="num">surface</div><div class="hex">FFFFFF</div></div>
  <div class="swatch dark-fg" style="background:#F5F5F5"><div class="num">50</div><div class="hex">F5F5F5</div></div>
  <div class="swatch dark-fg" style="background:#E5E5E5"><div class="num">100</div><div class="hex">E5E5E5</div></div>
  <div class="swatch dark-fg" style="background:#D4D4D4"><div class="num">200</div><div class="hex">D4D4D4</div></div>
  <div class="swatch dark-fg" style="background:#A3A3A3"><div class="num">300</div><div class="hex">A3A3A3</div></div>
  <div class="swatch light-fg" style="background:#737373"><div class="num">400</div><div class="hex">737373</div></div>
  <div class="swatch light-fg" style="background:#404040"><div class="num">600</div><div class="hex">404040</div></div>
  <div class="swatch light-fg" style="background:#262626"><div class="num">700</div><div class="hex">262626</div></div>
  <div class="swatch light-fg" style="background:#171717"><div class="num">800</div><div class="hex">171717</div></div>
  <div class="swatch light-fg" style="background:#0A0A0A"><div class="num">900</div><div class="hex">0A0A0A</div></div>
</div>
</body></html>
