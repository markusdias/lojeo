<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--paper); font-family:var(--font-sans); color:var(--fg); display:flex; flex-direction:column; gap:14px; }
  .empty { background:#fff; border:1px dashed #D4D4D4; border-radius:12px; padding:24px; text-align:center; }
  .empty .ico { width:40px; height:40px; margin:0 auto 12px; color:#A3A3A3; }
  .empty h3 { margin:0 0 6px; font-size:16px; font-weight:600; color:#0A0A0A; letter-spacing:-0.01em; }
  .empty p { margin:0 0 14px; font-size:13px; color:#737373; line-height:1.5; }
  .btn { display:inline-flex; align-items:center; gap:6px; height:36px; padding:0 14px; background:#00553D; color:#fff; border-radius:8px; font-size:13px; font-weight:500; border:0; cursor:pointer; }
</style></head><body>
  <div class="empty">
    <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-6 9 6v11a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2V9z"/></svg>
    <h3>Ainda nada por aqui</h3>
    <p>Comece criando seu primeiro produto. Leva 2 minutinhos.</p>
    <button class="btn">+ Criar produto</button>
  </div>
</body></html>
