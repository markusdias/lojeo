<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--paper); font-family:var(--font-sans); color:var(--fg); display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .card { background:#fff; border:1px solid #E5E5E5; border-radius:12px; padding:18px; box-shadow: 0 1px 3px rgba(10,10,10,0.05); }
  .card .label { font-size:12px; color:#737373; font-weight:500; }
  .card .value { font-family:var(--font-mono); font-size:28px; font-weight:600; color:#0A0A0A; letter-spacing:-0.02em; margin:6px 0 10px; font-variant-numeric: tabular-nums; }
  .delta { display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:500; }
  .up { color:#047857; }
  .down { color:#B91C1C; }
  .spark { height:32px; margin-top:8px; }
  .row { display:flex; align-items:center; justify-content:space-between; }
</style></head><body>
  <div class="card">
    <div class="row"><span class="label">Receita hoje</span><span class="delta up">▲ 12,4%</span></div>
    <div class="value">R$ 4.280,90</div>
    <svg class="spark" viewBox="0 0 100 30" preserveAspectRatio="none" width="100%"><polyline points="0,22 12,18 24,20 36,14 48,16 60,8 72,12 84,6 100,9" fill="none" stroke="#00553D" stroke-width="1.5"/></svg>
  </div>
  <div class="card">
    <div class="row"><span class="label">Pedidos</span><span class="delta up">▲ 3</span></div>
    <div class="value">28</div>
    <svg class="spark" viewBox="0 0 100 30" preserveAspectRatio="none" width="100%"><polyline points="0,18 14,16 28,20 42,12 56,14 70,10 84,8 100,11" fill="none" stroke="#737373" stroke-width="1.5"/></svg>
  </div>
  <div class="card">
    <div class="row"><span class="label">Conversão</span><span class="delta down">▼ 0,4%</span></div>
    <div class="value">2,8%</div>
    <svg class="spark" viewBox="0 0 100 30" preserveAspectRatio="none" width="100%"><polyline points="0,10 14,12 28,9 42,14 56,16 70,18 84,20 100,22" fill="none" stroke="#737373" stroke-width="1.5"/></svg>
  </div>
  <div class="card">
    <div class="row"><span class="label">Margem média</span><span class="delta up">▲ 1,1%</span></div>
    <div class="value">42,3%</div>
    <svg class="spark" viewBox="0 0 100 30" preserveAspectRatio="none" width="100%"><polyline points="0,20 14,18 28,16 42,14 56,12 70,10 84,9 100,7" fill="none" stroke="#00553D" stroke-width="1.5"/></svg>
  </div>
</body></html>
