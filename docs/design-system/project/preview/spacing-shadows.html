<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--paper); font-family: var(--font-sans); color: var(--fg); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 80px; height: 80px; background: var(--surface); border-radius: 12px; }
  .name { font-size: 11px; font-weight: 600; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-secondary); }
</style></head><body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow: 0 1px 2px rgba(10,10,10,0.04)"></div><div class="name">xs</div><div class="label">subtle</div></div>
  <div class="item"><div class="box" style="box-shadow: 0 1px 3px rgba(10,10,10,0.05), 0 1px 2px rgba(10,10,10,0.03)"></div><div class="name">sm</div><div class="label">card</div></div>
  <div class="item"><div class="box" style="box-shadow: 0 4px 8px -2px rgba(10,10,10,0.06), 0 2px 4px -2px rgba(10,10,10,0.04)"></div><div class="name">md</div><div class="label">popover</div></div>
  <div class="item"><div class="box" style="box-shadow: 0 12px 24px -8px rgba(10,10,10,0.08), 0 4px 8px -4px rgba(10,10,10,0.04)"></div><div class="name">lg</div><div class="label">drawer</div></div>
  <div class="item"><div class="box" style="box-shadow: 0 24px 48px -12px rgba(10,10,10,0.12)"></div><div class="name">xl</div><div class="label">modal</div></div>
</div>
</body></html>
