<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Lojeo — Explorations: Logo + Verde</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--paper); }

  /* Logo artboard styles */
  .logo-board {
    width: 100%; height: 100%;
    display: grid; grid-template-rows: 1fr 1fr; grid-template-columns: 1fr 1fr;
    gap: 1px; background: var(--neutral-100);
  }
  .logo-cell { display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; }
  .logo-cell .meta { position: absolute; bottom: 6px; left: 8px; font-family: var(--font-mono); font-size: 9px; color: var(--neutral-300); letter-spacing: 0.04em; }
  .light { background: #FAFAF7; }
  .dark  { background: #0A0A0A; }
  .word-light { color: #0A0A0A; }
  .word-dark  { color: #FAFAF7; }
  .lockup { display: flex; align-items: center; gap: 12px; }
  .word { font-size: 32px; font-weight: 600; letter-spacing: -0.04em; line-height: 1; }
  .word.lg { font-size: 40px; }

  .favicons { display: flex; align-items: center; gap: 18px; padding: 16px 24px; background: #F5F5F5; border-top: 1px solid var(--border); }
  .favicons .group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .favicons .group .meta { font-family: var(--font-mono); font-size: 9px; color: var(--neutral-400); }
  .fav-row { display: flex; align-items: flex-end; gap: 10px; }

  /* Hero (green compare) */
  .hero {
    width: 100%; height: 100%; padding: 32px;
    background: var(--paper); display: flex; flex-direction: column; gap: 18px;
    font-family: var(--font-sans);
  }
  .hero .top { display: flex; align-items: center; gap: 12px; }
  .hero .word-mini { font-size: 22px; font-weight: 600; letter-spacing: -0.04em; color: #0A0A0A; }
  .hero h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.025em; margin: 8px 0 0; color: #0A0A0A; }
  .hero .sub { color: #737373; font-size: 13px; margin: 4px 0 0; }
  .hero .actions { display: flex; gap: 8px; margin-top: 10px; }
  .hero .btn { display:inline-flex; align-items:center; height:36px; padding:0 14px; border-radius:8px; font-size:13px; font-weight:500; border:0; cursor:pointer; }
  .hero .btn.primary { color: white; }
  .hero .btn.secondary { background: white; color: #0A0A0A; border: 1px solid #D4D4D4; }
  .hero .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
  .hero .kpi { background: white; border: 1px solid #E5E5E5; border-radius: 10px; padding: 14px; }
  .hero .kpi .lbl { font-size: 11px; color: #737373; }
  .hero .kpi .val { font-family: var(--font-mono); font-size: 22px; font-weight: 600; letter-spacing: -0.02em; color: #0A0A0A; margin-top: 4px; }
  .hero .kpi .dl  { font-size: 11px; font-weight: 500; }
  .hero .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:600; color: white; align-self: flex-start; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: #737373; margin-top: auto; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const ACCENT = '#00553D';

// ─── Symbol variants (the four logo directions) ────────────────────────
// All sized at 56×56 viewBox
function MarkA({ fg = ACCENT, bg = '#FAFAF7' }) {
  // v1: shelter square w/ rounded bottom-left corner + organic dot
  return (
    <svg viewBox="0 0 56 56" width="48" height="48">
      <path d="M8 8 H44 V44 H20 a12 12 0 0 1 -12 -12 Z" fill={fg}/>
      <circle cx="34" cy="20" r="4" fill={bg}/>
    </svg>
  );
}
function MarkB({ fg = ACCENT, bg = '#FAFAF7' }) {
  // Monogram "l" — geometric, single stroke with rounded bottom turn (echoes "lojeo" descender)
  return (
    <svg viewBox="0 0 56 56" width="48" height="48">
      <path
        d="M18 8 V32 a8 8 0 0 0 8 8 H42"
        fill="none" stroke={fg} strokeWidth="8" strokeLinecap="square"
      />
    </svg>
  );
}
function MarkC({ fg = ACCENT, bg = '#FAFAF7' }) {
  // Architectural — abstract awning/façade: trapezoid + recessed door
  return (
    <svg viewBox="0 0 56 56" width="48" height="48">
      <path d="M10 18 L28 8 L46 18 L46 46 L10 46 Z" fill={fg}/>
      <rect x="22" y="26" width="12" height="20" fill={bg} rx="1"/>
    </svg>
  );
}
function MarkD({ fg = ACCENT, bg = '#FAFAF7', size = 48 }) {
  // Integrated lockup — symbol IS the dot of "j" — handled at lockup level
  // For solo cell, render the dot motif: a soft asymmetric "loja"-pebble
  return (
    <svg viewBox="0 0 56 56" width={size} height={size}>
      <path d="M8 28 a20 20 0 0 1 20 -20 h20 v20 a20 20 0 0 1 -20 20 h-20 z" fill={fg}/>
      <circle cx="40" cy="20" r="4" fill={bg}/>
    </svg>
  );
}

// Lockup variant D: wordmark with the j's dot as a glowing accent shape
function LockupD({ fg = '#0A0A0A', accent = ACCENT, size = 'lg' }) {
  return (
    <div className="lockup">
      <span className={`word ${size}`} style={{ color: fg, position: 'relative' }}>
        lojeo
        <span style={{
          position:'absolute', left: '23%', top: '-22%',
          width: 12, height: 12, borderRadius: 999, background: accent,
        }}/>
      </span>
    </div>
  );
}

// Generic 4-cell board
function LogoBoard({ Mark, lockupVariant, name }) {
  const isD = lockupVariant === 'D';
  return (
    <>
      <div className="logo-board">
        <div className="logo-cell light">
          {isD
            ? <LockupD fg="#0A0A0A" accent={ACCENT}/>
            : <div className="lockup"><Mark fg={ACCENT} bg="#FAFAF7"/><span className="word word-light">lojeo</span></div>}
          <span className="meta">LIGHT BG</span>
        </div>
        <div className="logo-cell dark">
          {isD
            ? <LockupD fg="#FAFAF7" accent="#34C796"/>
            : <div className="lockup"><Mark fg="#34C796" bg="#0A0A0A"/><span className="word word-dark">lojeo</span></div>}
          <span className="meta">DARK BG</span>
        </div>
        <div className="logo-cell light">
          {isD
            ? <LockupD fg="#0A0A0A" accent="#0A0A0A"/>
            : <div className="lockup"><Mark fg="#0A0A0A" bg="#FAFAF7"/><span className="word word-light">lojeo</span></div>}
          <span className="meta">MONO PRETO</span>
        </div>
        <div className="logo-cell dark">
          {isD
            ? <LockupD fg="#FAFAF7" accent="#FAFAF7"/>
            : <div className="lockup"><Mark fg="#FAFAF7" bg="#0A0A0A"/><span className="word word-dark">lojeo</span></div>}
          <span className="meta">MONO BRANCO</span>
        </div>
      </div>
      <div className="favicons">
        <div className="group">
          <div className="fav-row">
            <Mark fg={ACCENT} bg="#FAFAF7"/>
            <div style={{transform:'scale(0.66)', transformOrigin:'bottom left'}}><Mark fg={ACCENT} bg="#FAFAF7"/></div>
            <div style={{transform:'scale(0.33)', transformOrigin:'bottom left'}}><Mark fg={ACCENT} bg="#FAFAF7"/></div>
          </div>
          <span className="meta">48 / 32 / 16 px</span>
        </div>
      </div>
    </>
  );
}

// ─── Hero (admin dashboard) for green comparison ─────────────────────────
function Hero({ green, hover, label, hex }) {
  return (
    <div className="hero">
      <div className="top">
        <svg viewBox="0 0 56 56" width="32" height="32">
          <path d="M8 8 H44 V44 H20 a12 12 0 0 1 -12 -12 Z" fill={green}/>
          <circle cx="34" cy="20" r="4" fill="#FAFAF7"/>
        </svg>
        <span className="word-mini">lojeo</span>
        <span className="badge" style={{ background: green, marginLeft:'auto' }}>
          <span style={{width:5,height:5,borderRadius:99,background:'currentColor'}}/>{label}
        </span>
      </div>
      <div>
        <h1>Tudo certo, Marina 👋</h1>
        <p className="sub">Sua loja vendeu R$ 4.280 hoje.</p>
      </div>
      <div className="actions">
        <button className="btn primary" style={{ background: green }}>+ Novo produto</button>
        <button className="btn secondary">Exportar</button>
      </div>
      <div className="kpis">
        <div className="kpi">
          <div className="lbl">Receita hoje</div>
          <div className="val">R$ 4.280,90</div>
          <div className="dl" style={{ color: green }}>▲ 12,4%</div>
        </div>
        <div className="kpi">
          <div className="lbl">Conversão</div>
          <div className="val">2,8%</div>
          <div className="dl" style={{ color: '#B91C1C' }}>▼ 0,4%</div>
        </div>
      </div>
      <div className="hex">{hex} · hover {hover}</div>
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas title="lojeo · Explorations">
      <DCSection id="logo" title="1 · Logo" subtitle="4 direções · light/dark/mono · favicons 48/32/16">
        <DCArtboard id="A" label="A · Abrigo (atual)" width={520} height={480}>
          <LogoBoard Mark={MarkA}/>
        </DCArtboard>
        <DCArtboard id="B" label="B · Monograma l" width={520} height={480}>
          <LogoBoard Mark={MarkB}/>
        </DCArtboard>
        <DCArtboard id="C" label="C · Arquitetônico" width={520} height={480}>
          <LogoBoard Mark={MarkC}/>
        </DCArtboard>
        <DCArtboard id="D" label="D · Lockup integrado" width={520} height={480}>
          <LogoBoard Mark={MarkD} lockupVariant="D"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="green" title="2 · Verde" subtitle="4 tons aplicados no logo + hero do dashboard">
        <DCArtboard id="g1" label="Atual · #00553D" width={420} height={520}>
          <Hero green="#00553D" hover="#007A57" label="Atual" hex="#00553D"/>
        </DCArtboard>
        <DCArtboard id="g2" label="Premium clássico · #004D31" width={420} height={520}>
          <Hero green="#004D31" hover="#006944" label="Premium" hex="#004D31"/>
        </DCArtboard>
        <DCArtboard id="g3" label="Vibrante BR · #007940" width={420} height={520}>
          <Hero green="#007940" hover="#00964F" label="Vibrante" hex="#007940"/>
        </DCArtboard>
        <DCArtboard id="g4" label="Teal moderno · #00614D" width={420} height={520}>
          <Hero green="#00614D" hover="#00876B" label="Teal" hex="#00614D"/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
