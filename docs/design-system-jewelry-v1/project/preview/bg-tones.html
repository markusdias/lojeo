<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><title>Background tones</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; font-family: var(--font-body);}
  .row { display:grid; grid-template-columns: repeat(4,1fr); gap:12px;}
  .tone { border-radius:8px; padding:18px; height:120px; display:flex; flex-direction:column; justify-content:space-between; border: 1px solid #00000010;}
  .name { font-size:12px; font-weight:600;}
  .hex  { font-size:10px; color:#6B6055; font-family:var(--font-mono);}
  .card { width: 50%; height:36px; background:#fff; border-radius:4px; box-shadow:0 1px 2px rgba(0,0,0,.05);}
</style></head>
<body>
  <div class="row">
    <div class="tone" style="background:#FAFAF6"><div><div class="name">Warm</div><div class="hex">#FAFAF6 · default</div></div><div class="card"></div></div>
    <div class="tone" style="background:#FFFFFF"><div><div class="name">Pure</div><div class="hex">#FFFFFF</div></div><div class="card" style="background:#F4F4F4"></div></div>
    <div class="tone" style="background:#F7F8FA"><div><div class="name">Cool</div><div class="hex">#F7F8FA</div></div><div class="card"></div></div>
    <div class="tone" style="background:#F5EFE3"><div><div class="name">Cream</div><div class="hex">#F5EFE3</div></div><div class="card"></div></div>
  </div>
</body></html>
