<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><title>Trust signals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px; font-family:var(--font-body); background:var(--bg);}
  .row{display:grid; grid-template-columns: repeat(4,1fr); gap:16px;}
  .item{display:flex; flex-direction:column; align-items:center; text-align:center; gap:6px;}
  .icon{width:32px; height:32px; color:var(--accent); display:grid; place-items:center;}
  .lbl{font-size:12px; font-weight:500; color:var(--text-primary);}
  .desc{font-size:11px; color:var(--text-muted); line-height:1.3;}
</style></head>
<body>
  <div class="row">
    <div class="item">
      <svg class="icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <div class="lbl">Garantia 1 ano</div>
      <div class="desc">contra defeitos de fabricação</div>
    </div>
    <div class="item">
      <svg class="icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h13l5 5v5h-3"/><path d="M14 17H8"/><circle cx="6" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
      <div class="lbl">Frete grátis</div>
      <div class="desc">acima de R$ 500</div>
    </div>
    <div class="item">
      <svg class="icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/></svg>
      <div class="lbl">Embalagem presente</div>
      <div class="desc">inclusa em todo pedido</div>
    </div>
    <div class="item">
      <svg class="icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <div class="lbl">Trocas em 30 dias</div>
      <div class="desc">sem perguntas</div>
    </div>
  </div>
</body></html>
