<!doctype html>
<html lang="pt-BR" data-typo="a">
<head><meta charset="utf-8"><title>Type ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px;}
  .row{display:grid; grid-template-columns: 80px 1fr 100px; align-items:baseline; gap:14px; padding:6px 0; border-bottom:1px solid var(--divider);}
  .row:last-child{border:none;}
  .lbl{font-family:var(--font-mono); font-size:10px; color:var(--text-muted);}
  .specimen{margin:0; font-family:var(--font-display); color:var(--text-primary); line-height:1.05;}
  .specimen.body{font-family:var(--font-body); line-height:1.4;}
  .meta{font-family:var(--font-mono); font-size:10px; color:var(--text-muted); text-align:right;}
</style></head>
<body>
  <div class="row"><div class="lbl">H1</div><h1 class="specimen" style="font-size:42px;">Coleção Solitário</h1><div class="meta">clamp 40-64</div></div>
  <div class="row"><div class="lbl">H2</div><h2 class="specimen" style="font-size:30px;">Feita para você</h2><div class="meta">clamp 32-44</div></div>
  <div class="row"><div class="lbl">H3</div><h3 class="specimen" style="font-size:22px;">Acabamento fosco</h3><div class="meta">clamp 26-32</div></div>
  <div class="row"><div class="lbl">Lead</div><p class="specimen body" style="font-size:18px; color:var(--text-secondary); margin:0;">Ouro 18k · diamante 0,15ct</p><div class="meta">18px</div></div>
  <div class="row"><div class="lbl">Body</div><p class="specimen body" style="font-size:16px; margin:0;">Aliança polida em ouro amarelo, finalizada à mão.</p><div class="meta">16px</div></div>
  <div class="row"><div class="lbl">Small</div><p class="specimen body" style="font-size:14px; color:var(--text-secondary); margin:0;">Frete grátis acima de R$ 500</p><div class="meta">14px</div></div>
  <div class="row"><div class="lbl">Eyebrow</div><p class="specimen body" style="font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-secondary); margin:0;">Acabou de chegar</p><div class="meta">11px</div></div>
</body></html>
