<!doctype html>
<html lang="pt-BR" data-typo="b">
<head><meta charset="utf-8"><title>Type combo B</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px;}

  .lead{font-family:var(--font-body); font-size:16px; color:var(--text-secondary); line-height:1.55; margin:0; max-width:60ch;}

<body>
  <div class="meta">Combo B · editorial</div>
  <h1 style="font-size:54px; line-height:1.05;">Aliança Solitário</h1>

  <div class="stack">Playfair Display 500 · Source Sans 3 400</div>
