<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><title>Accent presets</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; font-family: var(--font-body); }
  .row { display:grid; grid-template-columns: repeat(5,1fr); gap:14px; }
  .preset { display:flex; flex-direction:column; gap:6px; align-items:center; text-align:center;}
  .swatch { width:100%; aspect-ratio: 1.6 / 1; border-radius: 8px; box-shadow: 0 1px 2px rgba(26,22,18,.06);}
  .label { font-size:11px; font-weight:600; }
  .hex   { font-size:10px; color:var(--text-muted); font-family:var(--font-mono);}
</style></head>
<body>
  <div class="row">
    <div class="preset"><div class="swatch" style="background:#B8956A"></div><div class="label">Champagne</div><div class="hex">#B8956A</div></div>
    <div class="preset"><div class="swatch" style="background:#9AA0A6"></div><div class="label">Silver</div><div class="hex">#9AA0A6</div></div>
    <div class="preset"><div class="swatch" style="background:#C8A28C"></div><div class="label">Rose gold</div><div class="hex">#C8A28C</div></div>
    <div class="preset"><div class="swatch" style="background:#A96B3F"></div><div class="label">Copper</div><div class="hex">#A96B3F</div></div>
    <div class="preset"><div class="swatch" style="background:#5C3A3F"></div><div class="label">Noir-rose</div><div class="hex">#5C3A3F</div></div>
  </div>
</body></html>
