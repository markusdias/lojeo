<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><title>Radius</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px; font-family:var(--font-body);}
  .row{display:grid; grid-template-columns: repeat(6,1fr); gap:14px;}
  .item{display:flex; flex-direction:column; align-items:center; gap:8px;}
  .box{width:64px; height:64px; background:var(--accent-soft); border:1px solid var(--accent);}
  .lbl{font-family:var(--font-mono); font-size:10px; color:var(--text-primary);}
  .px{font-family:var(--font-mono); font-size:10px; color:var(--text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:0"></div><span class="lbl">--r-none</span><span class="px">0</span></div>
    <div class="item"><div class="box" style="border-radius:2px"></div><span class="lbl">--r-sm</span><span class="px">2px</span></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><span class="lbl">--r-md</span><span class="px">8px</span></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><span class="lbl">--r-lg</span><span class="px">16px</span></div>
    <div class="item"><div class="box" style="border-radius:24px"></div><span class="lbl">--r-xl</span><span class="px">24px</span></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><span class="lbl">--r-pill</span><span class="px">999</span></div>
  </div>
</body></html>
