<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px; font-family:var(--font-body); background:var(--bg);}
  .row{display:grid; grid-template-columns: repeat(8,1fr); gap:14px; align-items:start;}
  .item{display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--text-primary);}
  .lbl{font-family:var(--font-mono); font-size:9px; color:var(--text-muted);}
  svg{stroke:currentColor; stroke-width:1.5; fill:none; stroke-linecap:round; stroke-linejoin:round;}
</style></head>
<body>
  <div class="row">
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg><span class="lbl">search</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span class="lbl">bookmark</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span class="lbl">heart</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="lbl">bag</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="lbl">user</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span class="lbl">close</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><span class="lbl">chevron</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="lbl">plus</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="lbl">minus</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span class="lbl">check</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M3 7h13l5 5v5h-3"/><path d="M14 17H8"/><circle cx="6" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg><span class="lbl">truck</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span class="lbl">shield</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span class="lbl">star</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/></svg><span class="lbl">gift</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/></svg><span class="lbl">trash</span></div>
    <div class="item"><svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span class="lbl">info</span></div>
  </div>
</body></html>
