<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:24px; font-family:var(--font-body); background:var(--bg);}
  .row{display:flex; flex-wrap:wrap; gap:10px;}
  .b{font-size:11px; letter-spacing:.12em; text-transform:uppercase; padding:6px 12px; border-radius:999px; font-weight:500;}
  .b-new{background:var(--surface); color:var(--text-primary); border:1px solid var(--divider);}
  .b-best{background:var(--accent-soft); color:var(--accent);}
  .b-low{background:#F6EEDC; color:#B8853A;}
  .b-out{background:#F4F4F2; color:var(--text-muted);}
  .b-sale{background:var(--text-primary); color:#fff;}
  .b-tag{background:transparent; color:var(--text-secondary); border:1px solid var(--divider);}
  .lbl{font-family:var(--font-mono); font-size:10px; color:var(--text-muted); margin-top:18px; margin-bottom:6px;}
  .ex{font-size:13px; color:var(--text-secondary); margin-top:14px;}
</style></head>
<body>
  <div class="row">
    <span class="b b-new">Acabou de chegar</span>
    <span class="b b-best">Mais querida</span>
    <span class="b b-low">Restam 3 unidades</span>
    <span class="b b-out">Esgotado</span>
    <span class="b b-sale">Pré-venda</span>
    <span class="b b-tag">ouro 18k</span>
    <span class="b b-tag">aro 14</span>
  </div>
  <div class="lbl">URGÊNCIA — APENAS DADOS REAIS</div>
  <div class="ex">12 pessoas vendo agora · vendido 4 vezes hoje · restam 3 unidades</div>
</body></html>
