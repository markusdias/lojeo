<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:0; margin:0; font-family:var(--font-body); background:var(--bg);}
  .grid{display:grid; grid-template-columns: 1fr 1fr; gap:0; height:100%;}
  .light{background:#FAFAF6; padding:20px; display:grid; place-items:center;}
  .dark{background:#1A1612; padding:20px; display:grid; place-items:center;}
  .light img, .dark img{max-width:240px;}
</style></head>
<body>
  <div class="grid">
    <div class="light"><img src="../assets/logo-placeholder.svg" alt=""></div>
    <div class="dark"><img src="../assets/logo-placeholder-light.svg" alt=""></div>
  </div>
</body></html>
