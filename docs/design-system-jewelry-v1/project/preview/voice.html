<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><title>Voice samples</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px; font-family:var(--font-body); background:var(--bg); font-size:13px;}
  .row{display:grid; grid-template-columns: 1fr 1fr; gap:16px;}
  .col{padding:12px 14px; border-radius:6px;}
  .good{background:#EEF2E8; border:1px solid #C8D6BB;}
  .bad{background:#F4E6E6; border:1px solid #E2C0C0;}
  .lbl{font-size:10px; letter-spacing:.12em; text-transform:uppercase; margin-bottom:6px;}
  .good .lbl{color:#5C7A4A;}
  .bad .lbl{color:#A84444;}
  .ex{margin-bottom:8px; line-height:1.45;}
  .ex:last-child{margin-bottom:0;}
</style></head>
<body>
  <div class="row">
    <div class="col good">
      <div class="lbl">✓ Prefira</div>
      <div class="ex">"Aliança Solitário · ouro 18k, diamante 0,15ct"</div>
      <div class="ex">"Feita sob encomenda em até 15 dias úteis."</div>
      <div class="ex">"Avise-me quando voltar"</div>
    </div>
    <div class="col bad">
      <div class="lbl">✗ Evite</div>
      <div class="ex">"Produto: Aliança · Material: Ouro"</div>
      <div class="ex">"ATENÇÃO! Entrega em até 15 dias!!!"</div>
      <div class="ex">"Notify me · OFERTA RELÂMPAGO"</div>
    </div>
  </div>
</body></html>
