<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><title>Review card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px; font-family:var(--font-body); background:var(--bg);}
  .review{background:var(--surface); padding:18px; border-radius:8px; display:grid; grid-template-columns: 80px 1fr; gap:14px;}
  .photo{aspect-ratio:1/1; background:#F4F1E9; border-radius:6px; overflow:hidden;}
  .photo img{width:100%; height:100%; object-fit:cover;}
  .stars{color:var(--accent); font-size:14px; letter-spacing:2px;}
  .author{font-size:12px; color:var(--text-secondary); margin:4px 0;}
  .quote{font-family:var(--font-display); font-size:18px; line-height:1.3; color:var(--text-primary); margin:6px 0 0; font-style:italic;}
  .body{font-size:13px; color:var(--text-secondary); margin-top:6px; line-height:1.5;}
  .verified{font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--success); margin-top:6px;}
</style></head>
<body>
  <div class="review">
    <div class="photo"><img src="../assets/product-placeholder.svg" alt=""></div>
    <div>
      <div class="stars">★★★★★</div>
      <div class="author">Carolina M. · São Paulo</div>
      <div class="quote">"Ficou ainda mais bonita que na foto."</div>
      <p class="body">A peça chegou em embalagem caprichada e o acabamento fosco é tudo que eu esperava. Uso todos os dias.</p>
      <div class="verified">✓ Compra verificada</div>
    </div>
  </div>
</body></html>
